defaults:
  - config
  - _self_

run_name: large
overwrite: True
output_dir: outputs/${data.name}/sweep_gamma

data:
  max_rows: 100000
  max_requests: 10000
  max_convs: 100

strategies:
  no_cache: {}
  balanced_2: {_base_: balanced, n_blocks: 2}
  balanced_5: {_base_: balanced, n_blocks: 5}
  # Exp decay with different gamma values for n_blocks=2
  exp_2_g90: {_base_: hist_exp_decay, n_blocks: 2, gamma: 0.90, replan_interval: 50}
  exp_2_g95: {_base_: hist_exp_decay, n_blocks: 2, gamma: 0.95, replan_interval: 50}
  exp_2_g99: {_base_: hist_exp_decay, n_blocks: 2, gamma: 0.99, replan_interval: 50}
  exp_2_g999: {_base_: hist_exp_decay, n_blocks: 2, gamma: 0.999, replan_interval: 50}
  # Exp decay with different gamma values for n_blocks=5
  exp_5_g90: {_base_: hist_exp_decay, n_blocks: 5, gamma: 0.90, replan_interval: 50}
  exp_5_g95: {_base_: hist_exp_decay, n_blocks: 5, gamma: 0.95, replan_interval: 50}
  exp_5_g99: {_base_: hist_exp_decay, n_blocks: 5, gamma: 0.99, replan_interval: 50}
  exp_5_g999: {_base_: hist_exp_decay, n_blocks: 5, gamma: 0.999, replan_interval: 50}
  # Also try different replan intervals
  exp_2_r10: {_base_: hist_exp_decay, n_blocks: 2, gamma: 0.95, replan_interval: 10}
  exp_2_r25: {_base_: hist_exp_decay, n_blocks: 2, gamma: 0.95, replan_interval: 25}
  exp_2_r100: {_base_: hist_exp_decay, n_blocks: 2, gamma: 0.95, replan_interval: 100}
  # Frozen baseline
  hist_frozen_2: {_base_: hist_frozen, n_blocks: 2}
  hist_frozen_5: {_base_: hist_frozen, n_blocks: 5}
