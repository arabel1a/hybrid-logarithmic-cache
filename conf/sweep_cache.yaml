defaults:
  - config
  - _self_

run_name: large
overwrite: True
output_dir: outputs/${data.name}/sweep_cache_${cache_manager.max_cached_sequences}

data:
  max_rows: 100000
  max_requests: 10000
  max_convs: 100

strategies:
  no_cache: {}
  exp_1: {_base_: hist_exp_decay, n_blocks: 1, gamma: 0.99, replan_interval: 10}
  exp_2: {_base_: hist_exp_decay, n_blocks: 2, gamma: 0.99, replan_interval: 10}
  exp_3: {_base_: hist_exp_decay, n_blocks: 3, gamma: 0.99, replan_interval: 10}
  exp_5: {_base_: hist_exp_decay, n_blocks: 5, gamma: 0.99, replan_interval: 10}
  balanced_1: {_base_: balanced, n_blocks: 1}
  balanced_2: {_base_: balanced, n_blocks: 2}
  balanced_3: {_base_: balanced, n_blocks: 3}
  balanced_5: {_base_: balanced, n_blocks: 5}
