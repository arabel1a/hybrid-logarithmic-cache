defaults:
  - config
  - _self_

run_name: large
overwrite: True
output_dir: outputs/${data.name}/sweep_best

data:
  max_rows: 100000
  max_requests: 10000
  max_convs: 100

strategies:
  no_cache: {}
  # Best exp decay settings (gamma=0.99, replan=10)
  exp_1: {_base_: hist_exp_decay, n_blocks: 1, gamma: 0.99, replan_interval: 10}
  exp_2: {_base_: hist_exp_decay, n_blocks: 2, gamma: 0.99, replan_interval: 10}
  exp_3: {_base_: hist_exp_decay, n_blocks: 3, gamma: 0.99, replan_interval: 10}
  exp_5: {_base_: hist_exp_decay, n_blocks: 5, gamma: 0.99, replan_interval: 10}
  exp_8: {_base_: hist_exp_decay, n_blocks: 8, gamma: 0.99, replan_interval: 10}
  # Frozen baseline
  hist_frozen_1: {_base_: hist_frozen, n_blocks: 1}
  hist_frozen_2: {_base_: hist_frozen, n_blocks: 2}
  hist_frozen_3: {_base_: hist_frozen, n_blocks: 3}
  hist_frozen_5: {_base_: hist_frozen, n_blocks: 5}
  hist_frozen_8: {_base_: hist_frozen, n_blocks: 8}
  # Balanced
  balanced_1: {_base_: balanced, n_blocks: 1}
  balanced_2: {_base_: balanced, n_blocks: 2}
  balanced_3: {_base_: balanced, n_blocks: 3}
  balanced_5: {_base_: balanced, n_blocks: 5}
  balanced_8: {_base_: balanced, n_blocks: 8}
