defaults:
  - config
  - _self_

run_name: large
overwrite: True
output_dir: outputs/${data.name}/sweep_online

data:
  max_rows: 100000
  max_requests: 10000
  max_convs: 100

strategies:
  no_cache: {}
  # Frozen histogram (warmup-trained, baseline)
  hist_frozen_1: {_base_: hist_frozen, n_blocks: 1}
  hist_frozen_2: {_base_: hist_frozen, n_blocks: 2}
  hist_frozen_3: {_base_: hist_frozen, n_blocks: 3}
  hist_frozen_5: {_base_: hist_frozen, n_blocks: 5}
  # Periodic histogram (re-solves DP every 100 obs during test)
  hist_periodic_1: {_base_: hist_periodic, n_blocks: 1, replan_interval: 50}
  hist_periodic_2: {_base_: hist_periodic, n_blocks: 2, replan_interval: 50}
  hist_periodic_3: {_base_: hist_periodic, n_blocks: 3, replan_interval: 50}
  hist_periodic_5: {_base_: hist_periodic, n_blocks: 5, replan_interval: 50}
  # Exp decay histogram (recent obs weighted more)
  hist_exp_1: {_base_: hist_exp_decay, n_blocks: 1, gamma: 0.99, replan_interval: 50}
  hist_exp_2: {_base_: hist_exp_decay, n_blocks: 2, gamma: 0.99, replan_interval: 50}
  hist_exp_3: {_base_: hist_exp_decay, n_blocks: 3, gamma: 0.99, replan_interval: 50}
  hist_exp_5: {_base_: hist_exp_decay, n_blocks: 5, gamma: 0.99, replan_interval: 50}
  # Balanced baseline
  balanced_1: {_base_: balanced, n_blocks: 1}
  balanced_2: {_base_: balanced, n_blocks: 2}
  balanced_3: {_base_: balanced, n_blocks: 3}
  balanced_5: {_base_: balanced, n_blocks: 5}
